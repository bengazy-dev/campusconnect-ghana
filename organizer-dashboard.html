<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Organizer dashboard — CampusConnect Ghana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <meta name="theme-color" content="#070a0f" />
  <script>
  (function(){try{var k="campusconnect-theme",t=localStorage.getItem(k);if(t!=="light"&&t!=="dark")t=matchMedia("(prefers-color-scheme: light)").matches?"light":"dark";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();
  </script>
</head>
<body class="page page--submit">
  <header class="site-header">
    <div class="site-header__inner">
      <a class="logo" href="index.html">
        <span class="logo__mark"><img src="assets/logo.png" alt="" width="28" height="28" decoding="async" /></span>
        CampusConnect
      </a>
      <div class="header-actions">
        <button type="button" class="theme-toggle" id="theme-toggle" role="switch">
          <span class="theme-toggle__thumb" aria-hidden="true"></span>
        </button>
        <div class="nav-shell">
          <input type="checkbox" id="nav-toggle" class="nav__toggle" />
          <label for="nav-toggle" class="nav__burger" aria-label="Open menu"><span></span></label>
          <nav class="nav" id="site-nav" aria-label="Primary">
            <a href="index.html">Feed</a>
            <a href="saved.html" class="js-student-only" hidden>Saved</a>
            <a href="submit.html" class="js-organizer-only">Post</a>
            <a href="organizer-dashboard.html" class="is-active js-organizer-only">Dashboard</a>
            <a href="login.html">Account</a>
          </nav>
        </div>
      </div>
    </div>
  </header>

  <main>
    <header class="page-head">
      <p class="eyebrow">Organizer</p>
      <h1>Your listings</h1>
      <p class="lead">
        Opportunities you published appear here. Students discover them on the main feed.
      </p>
      <p class="muted" style="margin-top: 0.5rem;">Signed in as <strong id="dashboard-org" class="text-highlight">…</strong></p>
    </header>

    <div class="dashboard-table-wrap card card--glass">
      <table class="dashboard-table" id="dashboard-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Type</th>
            <th>Deadline</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <p style="margin-top: 1.5rem;">
      <a class="btn btn--primary" href="submit.html">Post new opportunity</a>
    </p>
  </main>

  <footer class="site-foot">ALU Hackathon 2026 · CampusConnect Ghana</footer>

  <script src="js/insforge-env.js"></script>
  <script type="module" src="js/organizer-dashboard-app.js"></script>
  <script src="js/app.js" defer></script>
</body>
</html>
